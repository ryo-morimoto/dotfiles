rules:
  # Security: allowUnfree without scoping permits all non-free packages
  - id: nix.broad-allow-unfree
    languages: [generic]
    severity: WARNING
    message: >-
      allowUnfree = true permits all non-free packages globally.
      Consider allowUnfreePredicate for scoped control.
    pattern: allowUnfree = true
    paths:
      include: ["*.nix"]

  # Reproducibility: builtins.exec breaks declarative evaluation
  - id: nix.no-builtins-exec
    languages: [generic]
    severity: ERROR
    message: >-
      builtins.exec runs external commands during evaluation,
      breaking reproducibility and declarative guarantees.
    pattern: builtins.exec
    paths:
      include: ["*.nix"]

  # Reproducibility: builtins.fetchurl without hash is not pinned
  - id: nix.unpinned-builtins-fetchurl
    languages: [generic]
    severity: WARNING
    message: >-
      builtins.fetchurl without sha256 does not pin content.
      Use pkgs.fetchurl with a hash instead.
    pattern: builtins.fetchurl
    paths:
      include: ["*.nix"]

  # Idempotency: hardcoded /home paths break portability
  - id: nix.hardcoded-home-path
    languages: [generic]
    severity: WARNING
    message: >-
      Hardcoded /home path detected. Use a variable
      (homeDirectory, config.home.homeDirectory, etc.) for portability.
    pattern-regex: '"/home/[a-zA-Z0-9_-]+'
    paths:
      include: ["*.nix"]
      # homeDirectory definition itself is unavoidable
      exclude: ["**/home/default.nix"]

  # Declarativeness: mkForce/mkOverride may indicate design issues
  - id: nix.mkforce-audit
    languages: [generic]
    severity: INFO
    message: >-
      mkForce/mkOverride overrides module priority by force.
      Review whether the config structure can be simplified instead.
    pattern-either:
      - pattern: lib.mkForce
      - pattern: lib.mkOverride
    paths:
      include: ["*.nix"]

  # Security: permittedInsecurePackages should be reviewed periodically
  - id: nix.insecure-packages-review
    languages: [generic]
    severity: INFO
    message: >-
      permittedInsecurePackages is set. Ensure these packages
      are still needed and review their security status periodically.
    pattern: permittedInsecurePackages
    paths:
      include: ["*.nix"]
