multiplexer:
  backend: tmux
screen:
  image:
    backend: terminal
dangerKeys:
  - C-c
  - C-d
  - C-z
dangerCommandPatterns:
  - rm\s+(-rf?|--recursive)
  - sudo\s+rm
  - mkfs
  - dd\s+if=
  - ">\\s*/dev/"
  - chmod\s+777
  - curl.*\|\s*(ba)?sh
  - wget.*\|\s*(ba)?sh
launch:
  agents:
    codex:
      options: []
    claude:
      options: []
workspaceTabs:
  displayMode: all
