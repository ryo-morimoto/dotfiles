name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v17
      - uses: DeterminateSystems/magic-nix-cache-action@87b14cf437d03d37989d87f0fa5ce4f5dc1a330b # v8
      - name: Check flake
        run: nix flake check
      - name: Lint (nixf-tidy)
        run: |
          nix profile install nixpkgs#nixf nixpkgs#fd
          fd -e nix -x nixf-tidy {}
      - name: Check flake.lock health
        uses: DeterminateSystems/flake-checker-action@3164002371bc90729c68af0e24d5aacf20d7c9f6 # v12
      - name: Semgrep (nix)
        run: |
          nix profile install nixpkgs#semgrep
          semgrep scan --config .semgrep/ --error --severity ERROR --severity WARNING --no-git-ignore -j 1
      - name: Build NixOS configuration
        run: nix build .#nixosConfigurations.ryobox.config.system.build.toplevel --dry-run
