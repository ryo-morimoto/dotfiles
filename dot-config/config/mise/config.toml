[settings]
experimental = true

[tools]
aqua = "latest"
portless = "0.9.2"

[tools."github:vercel-labs/agent-browser"]
version = "0.23.4"
asset_pattern = "agent-browser-linux-x64"
bin = "agent-browser"

[tools."github:justrach/codedb"]
version = "0.2.54"
asset_pattern = "codedb-linux-x86_64"
bin = "codedb"

[tools."github:agentika-labs/grepika"]
version = "0.2.2"
asset_pattern = "grepika-x86_64-unknown-linux-gnu.tar.gz"
rename_exe = "grepika"

[tools."github:k1LoW/mo"]
version = "1.3.0"
asset_pattern = "mo_v1.3.0_linux_amd64.tar.gz"
rename_exe = "mo"

[tools."github:simonw/rodney"]
version = "0.4.0"
asset_pattern = "rodney-linux-amd64.tar.gz"
rename_exe = "rodney"

[tools."github:simonw/showboat"]
version = "0.6.1"
asset_pattern = "showboat-linux-amd64.tar.gz"
rename_exe = "showboat"

[tools."github:mizchi/starlint"]
version = "latest"
asset_pattern = "starlint-linux-x64.tar.gz"
rename_exe = "starlint"

[tools."http:coderabbit"]
version = "0.4.0"
url = "https://cli.coderabbit.ai/releases/{{version}}/coderabbit-linux-x64.zip"
rename_exe = "coderabbit"

[tools."http:zed-preview"]
version = "1.5.3-pre"
url = "https://github.com/zed-industries/zed/releases/download/v{{version}}/zed-linux-x86_64.tar.gz"
bin_path = "bin"
filter_bins = "zed"

[tasks.install-sandbox-broker]
description = "Install local sandbox-broker outside Nix"
run = "cargo install --locked --path /home/ryo-morimoto/ghq/github.com/ryo-morimoto/dotfiles/tools/sandbox-broker --root ~/.local"

[tasks.install-cursor-agent]
description = "Install Cursor Agent CLI outside Nix"
run = '''
set -euo pipefail
version="2026.03.20-44cb435"
bin_dir="$HOME/.local/bin"
install_dir="$HOME/.local/share/dotfiles-tools/cursor-agent"
tmp_dir="$(mktemp -d)"
trap 'rm -rf "$tmp_dir"' EXIT

mkdir -p "$bin_dir" "$install_dir"
curl --fail --location --silent --show-error \
  "https://downloads.cursor.com/lab/${version}/linux/x64/agent-cli-package.tar.gz" \
  --output "$tmp_dir/cursor-agent.tar.gz"
rm -rf "$install_dir"
mkdir -p "$install_dir"
tar -xzf "$tmp_dir/cursor-agent.tar.gz" -C "$install_dir" --strip-components=1
cat >"$bin_dir/agent" <<EOF
#!/usr/bin/env bash
CURSOR_INVOKED_AS=agent exec "$install_dir/node" --use-system-ca "$install_dir/index.js" "\$@"
EOF
chmod +x "$bin_dir/agent"
ln -sf "$bin_dir/agent" "$bin_dir/cursor-agent"
'''
