[settings]
experimental = true

[tools]
aqua = "latest"
portless = "latest"
"pipx:apm-cli" = "0.16.1"
"npm:agent-browser" = "latest"
"npm:@tobilu/qmd" = { version = "2.5.3", npm_args = "--ignore-scripts=false" }

[tools."github:justrach/codedb"]
version = "latest"
asset_pattern = "codedb-linux-x86_64"
bin = "codedb"

[tools."github:agentika-labs/grepika"]
version = "latest"
asset_pattern = "grepika-x86_64-unknown-linux-gnu.tar.gz"
rename_exe = "grepika"

[tools."github:k1LoW/mo"]
version = "latest"
asset_pattern = "mo_v*_linux_amd64.tar.gz"
rename_exe = "mo"

[tools."github:mizchi/starlint"]
version = "latest"
asset_pattern = "starlint-linux-x64.tar.gz"
rename_exe = "starlint"

[tools."http:coderabbit"]
version = "0.4.0"
url = "https://cli.coderabbit.ai/releases/{{version}}/coderabbit-linux-x64.zip"
rename_exe = "coderabbit"

[tools."github:zed-industries/zed"]
version = "latest"
asset_pattern = "zed-linux-x86_64.tar.gz"
bin_path = "zed.app/bin"
filter_bins = "zed"

[tasks.install-cursor-agent]
description = "Install Cursor Agent CLI outside Nix"
run = "curl https://cursor.com/install -fsS | bash"
