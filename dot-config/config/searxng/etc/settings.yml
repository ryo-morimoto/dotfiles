# SearXNG settings for local agent search.

use_default_settings: true

general:
  debug: false
  instance_name: "SearXNG Local"

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  formats:
    - html
    - json

server:
  # Overwritten by SEARXNG_SECRET from ~/.local/state/searxng/searxng.env.
  secret_key: "ultrasecretkey"
  limiter: false
  image_proxy: true

