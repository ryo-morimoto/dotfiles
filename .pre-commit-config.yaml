repos:
  - repo: local
    hooks:
      # Lint (priority 0: run in parallel)
      - id: nixfmt
        name: nixfmt
        entry: nixfmt
        language: system
        files: '\.nix$'
        priority: 0

      - id: statix
        name: statix
        entry: statix check
        language: system
        files: '\.nix$'
        pass_filenames: false
        priority: 0

      - id: deadnix
        name: deadnix
        entry: deadnix --fail
        language: system
        files: '\.nix$'
        priority: 0

      - id: nixf-tidy
        name: nixf-tidy
        entry: nixf-tidy
        language: system
        files: '\.nix$'
        priority: 0

      - id: flake-checker
        name: flake-checker
        entry: flake-checker --no-telemetry
        language: system
        pass_filenames: false
        files: 'flake\.lock$'
        priority: 0

      - id: semgrep-nix
        name: semgrep (nix)
        entry: semgrep scan --config .semgrep/ --error --severity ERROR --severity WARNING --no-git-ignore -j 1
        language: system
        files: '\.nix$'
        pass_filenames: false
        priority: 0

      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        files: '\.sh$'
        priority: 0

      - id: shfmt
        name: shfmt
        entry: shfmt -d
        language: system
        files: '\.sh$'
        priority: 0

      - id: gitleaks-staged
        name: gitleaks (staged)
        entry: gitleaks protect --staged --no-banner --redact
        language: system
        pass_filenames: false
        stages: [pre-commit]
        priority: 0

      # Build (priority 10: run after lint)
      - id: nix-build
        name: nix build
        entry: nix build .#nixosConfigurations.ryobox.config.system.build.toplevel --no-link
        language: system
        files: '\.nix$'
        pass_filenames: false
        stages: [pre-commit]
        priority: 10

      # Pre-push: full history scan
      - id: gitleaks-full
        name: gitleaks (full history)
        entry: gitleaks detect --no-banner --redact
        language: system
        pass_filenames: false
        stages: [pre-push]
        priority: 0
